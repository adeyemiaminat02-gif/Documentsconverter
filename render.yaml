services:
  - type: web
    name: documents-converting-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: conv_bot.db
      - key: MAX_FILE_SIZE_MB
        value: 50
